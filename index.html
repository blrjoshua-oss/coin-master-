<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Cash Compass – Money Mind</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#06080c;
    --surface:#0e131a;
    --surface-alt:#131a22;
    --border:#212b36;
    --border-soft:#1a222c;
    --text:#e7edf3;
    --text-muted:#7c8797;
    --mint:#3cffb0;
    --pink:#ff3d9a;
    --violet:#7b5cff;
    --amber:#ffc24d;
    --cyan:#43d9ff;
    --coral:#ff6659;
    --lilac:#c88cff;
    --lime:#c6ff4d;
    --green:#52e07a;
    --gold:#ffe14d;
    --skyblue:#63c7ff;
    --rose:#ff5c7a;
    --teal:#2de0c4;
    --blue:#4f86ff;
    --orange:#ff9142;
    --danger:#ff4f6d;
    --radius:14px;
    --radius-sm:10px;
    --font-display:'Space Grotesk', 'Segoe UI', system-ui, sans-serif;
    --font-body:'Inter', 'Segoe UI', system-ui, sans-serif;
    --font-mono:'JetBrains Mono', 'Consolas', monospace;
  }

  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; width:100%; overflow-x:hidden; }

  body{
    background-color:var(--bg);
    background-image:
      radial-gradient(circle at 15% 15%, rgba(67,217,255,0.16), transparent 42%),
      radial-gradient(circle at 85% 25%, rgba(255,61,154,0.14), transparent 45%),
      radial-gradient(circle at 30% 85%, rgba(123,92,255,0.15), transparent 45%),
      radial-gradient(circle at 90% 90%, rgba(255,194,77,0.12), transparent 42%);
    background-size:200% 200%;
    background-attachment:fixed;
    animation:driftBackground 28s ease-in-out infinite alternate;
    color:var(--text);
    font-family:var(--font-body);
    min-height:100vh;
    line-height:1.5;
    -webkit-tap-highlight-color:transparent;
  }

  @keyframes driftBackground{
    0%{ background-position:0% 0%, 100% 0%, 30% 100%, 100% 100%; }
    50%{ background-position:30% 25%, 70% 35%, 45% 70%, 75% 75%; }
    100%{ background-position:0% 0%, 100% 0%, 30% 100%, 100% 100%; }
  }

  button, input{ font-family:inherit; -webkit-appearance:none; appearance:none; }
  input:focus-visible, button:focus-visible, input[type="date"]:focus-visible{
    outline:2px solid var(--mint);
    outline-offset:2px;
  }

  .wrap{
    width:100%;
    max-width:1080px;
    margin:0 auto;
    padding:1.25rem clamp(1rem, 4vw, 2rem) 3rem;
  }

  /* ---------- Header ---------- */
  .topbar{
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    justify-content:space-between;
    gap:1rem;
    padding-bottom:1.25rem;
    border-bottom:1px solid var(--border-soft);
    margin-bottom:1.25rem;
  }

  .brand{
    display:flex;
    align-items:center;
    gap:0.65rem;
  }
  .brand-dot{
    width:0.7rem;
    height:0.7rem;
    border-radius:50%;
    background:var(--mint);
    box-shadow:0 0 0.7em var(--mint);
    flex-shrink:0;
    animation:pulseDot 3.2s ease-in-out infinite;
  }
  @keyframes pulseDot{
    0%, 100%{ background:var(--mint); box-shadow:0 0 0.7em var(--mint); }
    33%{ background:var(--cyan); box-shadow:0 0 0.7em var(--cyan); }
    66%{ background:var(--violet); box-shadow:0 0 0.7em var(--violet); }
  }
  .brand-text{ display:flex; flex-direction:column; line-height:1.1; }
  .brand-name{
    font-family:var(--font-display);
    font-weight:700;
    font-size:clamp(1.25rem, 3vw, 1.6rem);
    letter-spacing:0.01em;
  }
  .brand-tag{
    font-size:0.7rem;
    text-transform:uppercase;
    letter-spacing:0.12em;
    color:var(--text-muted);
    margin-top:0.15rem;
  }

  .income-field{
    display:flex;
    align-items:baseline;
    gap:0.6rem;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius-sm);
    padding:0.55rem 0.9rem;
    flex:1 1 220px;
    max-width:340px;
  }
  .income-field label{
    font-size:0.7rem;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--text-muted);
    white-space:nowrap;
  }
  .income-field input{
    background:transparent;
    border:none;
    color:var(--mint);
    font-family:var(--font-mono);
    font-size:1rem;
    font-weight:500;
    width:100%;
    min-width:0;
    text-align:right;
  }
  .income-field input::placeholder{ color:var(--text-muted); }

  /* ---------- Date row ---------- */
  .date-row{
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    gap:0.75rem;
    margin-bottom:1.5rem;
  }
  .date-row .field{
    display:flex;
    align-items:center;
    gap:0.6rem;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius-sm);
    padding:0.55rem 0.9rem;
  }
  .date-row label{
    font-size:0.7rem;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--text-muted);
    white-space:nowrap;
  }
  .date-row input[type="date"]{
    background:transparent;
    border:none;
    color:var(--text);
    font-family:var(--font-mono);
    font-size:0.95rem;
    min-width:0;
    color-scheme:dark;
  }

  .btn{
    font-family:var(--font-body);
    font-weight:600;
    font-size:0.85rem;
    border-radius:var(--radius-sm);
    padding:0.6rem 1.1rem;
    cursor:pointer;
    border:1px solid var(--border);
    background:var(--surface);
    color:var(--text);
    transition:transform 0.12s ease, border-color 0.15s ease, color 0.15s ease;
    min-height:44px;
  }
  .btn:hover{ border-color:var(--pink); color:var(--pink); }
  .btn:active{ transform:scale(0.97); }
  .btn-ghost{ margin-left:auto; }

  /* ---------- Dashboard grid ---------- */
  .dashboard{
    display:grid;
    grid-template-columns:1fr;
    gap:1.25rem;
  }

  .card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:1.25rem clamp(1rem, 3vw, 1.5rem) 1.5rem;
    min-width:0;
  }
  .card h2{
    font-family:var(--font-display);
    font-size:1rem;
    font-weight:500;
    margin:0 0 1rem;
    color:var(--text-muted);
    text-transform:uppercase;
    letter-spacing:0.06em;
  }

  /* ---------- Category grid ---------- */
  .category-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(210px, 1fr));
    gap:0.65rem;
  }
  .category-item{
    display:flex;
    align-items:center;
    gap:0.75rem;
    background:var(--surface-alt);
    border:1px solid var(--border-soft);
    border-left:3px solid var(--cat-color, var(--mint));
    border-radius:var(--radius-sm);
    padding:0.6rem 0.8rem;
    min-width:0;
  }
  .category-item label{
    flex:1 1 auto;
    font-size:0.92rem;
    font-weight:500;
    min-width:0;
  }
  .category-item input{
    width:6.5rem;
    max-width:40%;
    background:var(--bg);
    border:1px solid var(--border);
    border-radius:8px;
    color:var(--text);
    font-family:var(--font-mono);
    font-size:0.95rem;
    text-align:right;
    padding:0.5rem 0.6rem;
    min-height:40px;
  }
  .category-item input::placeholder{ color:var(--text-muted); }

  /* ---------- Summary ---------- */
  .summary-row{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    padding:0.6rem 0;
    border-bottom:1px solid var(--border-soft);
    gap:0.75rem;
  }
  .summary-row:last-of-type{ border-bottom:none; }
  .summary-row span{
    color:var(--text-muted);
    font-size:0.85rem;
  }
  .summary-row strong{
    font-family:var(--font-mono);
    font-size:1.15rem;
    font-weight:500;
    white-space:nowrap;
  }
  .balance-row strong{ color:var(--mint); }
  .balance-row.negative strong{ color:var(--danger); }

  .pulse-wrap{ margin-top:1.25rem; }
  .pulse-label{
    display:flex;
    justify-content:space-between;
    font-size:0.7rem;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--text-muted);
    margin-bottom:0.5rem;
  }
  .pulse-label span:last-child{ font-family:var(--font-mono); color:var(--text); }
  .pulse-track{
    width:100%;
    height:10px;
    border-radius:999px;
    background:var(--surface-alt);
    border:1px solid var(--border-soft);
    overflow:hidden;
    position:relative;
  }
  .pulse-fill{
    height:100%;
    width:0%;
    border-radius:999px;
    transition:width 0.4s ease, background-color 0.4s ease;
    position:relative;
  }
  .pulse-fill.safe{ background:var(--mint); box-shadow:0 0 10px rgba(60,255,176,0.55); }
  .pulse-fill.caution{ background:var(--amber); box-shadow:0 0 10px rgba(255,194,77,0.5); }
  .pulse-fill.danger{ background:var(--pink); box-shadow:0 0 10px rgba(255,61,154,0.55); }
  .pulse-fill::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
    transform:translateX(-100%);
    animation:sweep 2.4s ease-in-out infinite;
  }
  @keyframes sweep{
    0%{ transform:translateX(-100%); }
    60%{ transform:translateX(220%); }
    100%{ transform:translateX(220%); }
  }
  .pulse-hint{
    margin-top:0.6rem;
    font-size:0.78rem;
    color:var(--text-muted);
  }

  .footnote{
    text-align:center;
    color:var(--text-muted);
    font-size:0.75rem;
    margin-top:2rem;
  }

  @media (prefers-reduced-motion: reduce){
    body{ animation:none; }
    .brand-dot{ animation:none; }
    .pulse-fill::after{ animation:none; }
    .btn, .pulse-fill{ transition:none; }
  }

  /* ---------- Desktop layout ---------- */
  @media (min-width:768px){
    .wrap{ padding-top:2rem; }
    .dashboard{
      grid-template-columns:1.5fr 1fr;
      align-items:start;
    }
    .summary-card{ position:sticky; top:2rem; }
  }

  @media (max-width:480px){
    .income-field{ max-width:none; flex-basis:100%; }
    .btn-ghost{ margin-left:0; flex:1 1 auto; }
    .date-row .field{ flex:1 1 auto; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header class="topbar">
    <div class="brand">
      <span class="brand-dot" aria-hidden="true"></span>
      <div class="brand-text">
        <span class="brand-name">Cash Compass</span>
        <span class="brand-tag">money mind</span>
      </div>
    </div>
    <div class="income-field">
      <label for="incomeInput">Monthly income</label>
      <input type="number" id="incomeInput" inputmode="decimal" min="0" step="0.01" placeholder="0">
    </div>
  </header>

  <section class="date-row">
    <div class="field">
      <label for="datePicker">Date</label>
      <input type="date" id="datePicker">
    </div>
    <button class="btn btn-ghost" id="resetBtn" type="button">Reset day</button>
  </section>

  <main class="dashboard">
    <section class="card categories-card">
      <h2>Today's expenses</h2>
      <div class="category-grid" id="categoryGrid"></div>
    </section>

    <aside class="card summary-card">
      <h2>Summary</h2>
      <div class="summary-row">
        <span>Daily total</span>
        <strong id="dailyTotal">₹0</strong>
      </div>
      <div class="summary-row">
        <span>Monthly total</span>
        <strong id="monthlyTotal">₹0</strong>
      </div>
      <div class="summary-row balance-row" id="balanceRow">
        <span>Remaining balance</span>
        <strong id="balanceTotal">₹0</strong>
      </div>

      <div class="pulse-wrap">
        <div class="pulse-label"><span>Balance pulse</span><span id="pulsePct">0%</span></div>
        <div class="pulse-track"><div class="pulse-fill safe" id="pulseFill"></div></div>
        <p class="pulse-hint" id="pulseHint">Share of this month's income spent so far.</p>
      </div>
    </aside>
  </main>

  <p class="footnote">Saved automatically on this device, every day — even after you close the app. Nothing leaves your browser.</p>

</div>

<script>
(function(){
  "use strict";

  /* ---------------- Safe storage wrapper ---------------- */
  var memoryStore = {};
  var storageAvailable = true;
  try{
    var t = "__cashcompass_test__";
    localStorage.setItem(t, "1");
    localStorage.removeItem(t);
  }catch(e){
    storageAvailable = false;
  }
  var storage = {
    get: function(key){
      if(!storageAvailable) return Object.prototype.hasOwnProperty.call(memoryStore, key) ? memoryStore[key] : null;
      try{
        return localStorage.getItem(key);
      }catch(e){
        return Object.prototype.hasOwnProperty.call(memoryStore, key) ? memoryStore[key] : null;
      }
    },
    set: function(key, value){
      if(!storageAvailable){ memoryStore[key] = value; return; }
      try{
        localStorage.setItem(key, value);
      }catch(e){
        memoryStore[key] = value;
      }
    }
  };

  var KEY_INCOME = "cashCompass.monthlyIncome";
  var KEY_DATA = "cashCompass.dailyData";

  var CATEGORIES = [
    { key:"petrol",        label:"Petrol",        color:"var(--amber)" },
    { key:"groceries",     label:"Groceries",     color:"var(--green)" },
    { key:"food",          label:"Food",          color:"var(--lime)" },
    { key:"shopping",      label:"Shopping",      color:"var(--pink)" },
    { key:"bills",         label:"Bills",         color:"var(--violet)" },
    { key:"electricity",   label:"Electricity",   color:"var(--gold)" },
    { key:"water",         label:"Water",         color:"var(--skyblue)" },
    { key:"rent",          label:"Rent",          color:"var(--cyan)" },
    { key:"medical",       label:"Medical",       color:"var(--coral)" },
    { key:"hospital",      label:"Hospital",      color:"var(--rose)" },
    { key:"pharmacy",      label:"Pharmacy",      color:"var(--teal)" },
    { key:"travel",        label:"Travel",        color:"var(--blue)" },
    { key:"recharge",      label:"Recharge",      color:"var(--orange)" },
    { key:"entertainment", label:"Entertainment", color:"var(--lilac)" },
    { key:"other",         label:"Other",         color:"var(--mint)" }
  ];

  /* ---------------- Helpers ---------------- */
  function safeNumber(v){
    var n = parseFloat(v);
    if(isNaN(n) || !isFinite(n) || n < 0) return 0;
    return n;
  }

  function formatDate(d){
    var y = d.getFullYear();
    var m = String(d.getMonth() + 1).padStart(2, "0");
    var day = String(d.getDate()).padStart(2, "0");
    return y + "-" + m + "-" + day;
  }

  function todayStr(){ return formatDate(new Date()); }

  function formatCurrency(n){
    var sign = n < 0 ? "-" : "";
    var abs = Math.abs(n);
    var formatted;
    try{
      formatted = abs.toLocaleString("en-IN", { maximumFractionDigits: 2, minimumFractionDigits: 0 });
    }catch(e){
      formatted = abs.toFixed(2);
    }
    return sign + "₹" + formatted;
  }

  function getAllData(){
    var raw = storage.get(KEY_DATA);
    if(!raw) return {};
    try{
      var parsed = JSON.parse(raw);
      return (parsed && typeof parsed === "object") ? parsed : {};
    }catch(e){
      return {};
    }
  }

  function saveAllData(all){
    try{
      storage.set(KEY_DATA, JSON.stringify(all));
    }catch(e){
      /* keep app running even if this write fails */
    }
  }

  function getIncome(){
    var v = storage.get(KEY_INCOME);
    return v !== null && v !== undefined ? safeNumber(v) : 0;
  }

  function setIncome(v){
    storage.set(KEY_INCOME, String(safeNumber(v)));
  }

  function loadDay(dateStr){
    var all = getAllData();
    return all[dateStr] || {};
  }

  function saveDayEntry(dateStr, categoryKey, value){
    var all = getAllData();
    if(!all[dateStr]) all[dateStr] = {};
    all[dateStr][categoryKey] = safeNumber(value);
    saveAllData(all);
  }

  function clearDay(dateStr){
    var all = getAllData();
    delete all[dateStr];
    saveAllData(all);
  }

  function computeDailyTotal(dateStr){
    var day = loadDay(dateStr);
    var sum = 0;
    for(var i = 0; i < CATEGORIES.length; i++){
      sum += safeNumber(day[CATEGORIES[i].key]);
    }
    return sum;
  }

  function computeMonthlyTotal(dateStr){
    var all = getAllData();
    var prefix = dateStr.slice(0, 7);
    var total = 0;
    Object.keys(all).forEach(function(key){
      if(key.indexOf(prefix) === 0){
        var day = all[key];
        for(var i = 0; i < CATEGORIES.length; i++){
          total += safeNumber(day[CATEGORIES[i].key]);
        }
      }
    });
    return total;
  }

  /* ---------------- DOM refs ---------------- */
  var incomeInput = document.getElementById("incomeInput");
  var datePicker = document.getElementById("datePicker");
  var resetBtn = document.getElementById("resetBtn");
  var categoryGrid = document.getElementById("categoryGrid");
  var dailyTotalEl = document.getElementById("dailyTotal");
  var monthlyTotalEl = document.getElementById("monthlyTotal");
  var balanceTotalEl = document.getElementById("balanceTotal");
  var balanceRowEl = document.getElementById("balanceRow");
  var pulseFillEl = document.getElementById("pulseFill");
  var pulsePctEl = document.getElementById("pulsePct");

  var currentDate = todayStr();

  /* ---------------- Render categories ---------------- */
  function renderCategoryInputs(){
    var frag = document.createDocumentFragment();
    CATEGORIES.forEach(function(cat){
      var item = document.createElement("div");
      item.className = "category-item";
      item.style.setProperty("--cat-color", cat.color);

      var label = document.createElement("label");
      label.setAttribute("for", "cat-" + cat.key);
      label.textContent = cat.label;

      var input = document.createElement("input");
      input.type = "number";
      input.id = "cat-" + cat.key;
      input.setAttribute("data-key", cat.key);
      input.min = "0";
      input.step = "0.01";
      input.inputMode = "decimal";
      input.placeholder = "0";

      input.addEventListener("input", function(){
        var key = this.getAttribute("data-key");
        saveDayEntry(currentDate, key, this.value);
        updateSummary();
      });

      item.appendChild(label);
      item.appendChild(input);
      frag.appendChild(item);
    });
    categoryGrid.appendChild(frag);
  }

  function populateInputsForDate(dateStr){
    var day = loadDay(dateStr);
    CATEGORIES.forEach(function(cat){
      var input = document.getElementById("cat-" + cat.key);
      if(!input) return;
      var val = day[cat.key];
      input.value = (val === undefined || val === null || val === 0) ? "" : val;
    });
  }

  /* ---------------- Summary + pulse ---------------- */
  function updateSummary(){
    var income = getIncome();
    var daily = computeDailyTotal(currentDate);
    var monthly = computeMonthlyTotal(currentDate);
    var balance = income - monthly;

    dailyTotalEl.textContent = formatCurrency(daily);
    monthlyTotalEl.textContent = formatCurrency(monthly);
    balanceTotalEl.textContent = formatCurrency(balance);
    balanceRowEl.classList.toggle("negative", balance < 0);

    var pct;
    if(income > 0){
      pct = (monthly / income) * 100;
    }else{
      pct = monthly > 0 ? 100 : 0;
    }
    var clamped = Math.max(0, Math.min(pct, 100));

    pulseFillEl.style.width = clamped + "%";
    pulsePctEl.textContent = Math.round(pct) + "%";

    pulseFillEl.classList.remove("safe", "caution", "danger");
    if(pct < 60){ pulseFillEl.classList.add("safe"); }
    else if(pct < 90){ pulseFillEl.classList.add("caution"); }
    else{ pulseFillEl.classList.add("danger"); }
  }

  /* ---------------- Events ---------------- */
  incomeInput.addEventListener("input", function(){
    setIncome(this.value);
    updateSummary();
  });

  datePicker.addEventListener("change", function(){
    var val = this.value;
    currentDate = val ? val : todayStr();
    populateInputsForDate(currentDate);
    updateSummary();
  });

  resetBtn.addEventListener("click", function(){
    var ok = window.confirm("Reset all expenses saved for " + currentDate + "? This can't be undone.");
    if(!ok) return;
    clearDay(currentDate);
    populateInputsForDate(currentDate);
    updateSummary();
  });

  /* ---------------- Init ---------------- */
  function init(){
    renderCategoryInputs();

    var storedIncome = getIncome();
    incomeInput.value = storedIncome > 0 ? storedIncome : "";

    datePicker.value = currentDate;
    populateInputsForDate(currentDate);
    updateSummary();
  }

  if(document.readyState === "loading"){
    document.addEventListener("DOMContentLoaded", init);
  }else{
    init();
  }
})();
</script>
</body>
</html>
